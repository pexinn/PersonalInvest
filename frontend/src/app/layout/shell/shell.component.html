<mat-sidenav-container class="shell-container">
  <!-- Sidenav -->
  <mat-sidenav #sidenav mode="side" opened class="sidenav" [fixedInViewport]="true">
    <!-- Logo / Brand -->
    <div class="brand">
      <mat-icon>account_balance</mat-icon>
      <span>PersonalInvest</span>
    </div>

    <!-- Navigation -->
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" title="Dashboard">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Panorama</span>
      </a>

      <div class="nav-section-label">Lançamentos</div>
      <a mat-list-item routerLink="/aportes" routerLinkActive="active-link" title="Aportes">
        <mat-icon matListItemIcon>add_circle</mat-icon>
        <span matListItemTitle>Aportes</span>
      </a>
      <a mat-list-item routerLink="/proventos" routerLinkActive="active-link" title="Proventos">
        <mat-icon matListItemIcon>payments</mat-icon>
        <span matListItemTitle>Proventos</span>
      </a>

      <div class="nav-section-label">Carteira</div>
      <a mat-list-item routerLink="/carteira/acoes" routerLinkActive="active-link">
        <mat-icon matListItemIcon>trending_up</mat-icon>
        <span matListItemTitle>Ações</span>
      </a>
      <a mat-list-item routerLink="/carteira/fiis" routerLinkActive="active-link">
        <mat-icon matListItemIcon>business</mat-icon>
        <span matListItemTitle>FIIs</span>
      </a>
      <a mat-list-item routerLink="/carteira/eua" routerLinkActive="active-link">
        <mat-icon matListItemIcon>public</mat-icon>
        <span matListItemTitle>EUA (USD)</span>
      </a>
      <a mat-list-item routerLink="/carteira/fundos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>pie_chart</mat-icon>
        <span matListItemTitle>Fundos Ações</span>
      </a>
      <a mat-list-item routerLink="/carteira/fixa" routerLinkActive="active-link">
        <mat-icon matListItemIcon>savings</mat-icon>
        <span matListItemTitle>Renda Fixa</span>
      </a>

      <div class="nav-section-label">Patrimônio</div>
      <a mat-list-item routerLink="/patrimonio" routerLinkActive="active-link">
        <mat-icon matListItemIcon>account_balance_wallet</mat-icon>
        <span matListItemTitle>Patrimônio</span>
      </a>

      <mat-divider></mat-divider>

      <a mat-list-item routerLink="/ativos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Ativos</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="main-content">
    <!-- Toolbar -->
    <mat-toolbar class="toolbar" color="primary">
      <button mat-icon-button (click)="sidenav.toggle()" title="Menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ title }}</span>
      <span class="spacer"></span>
      <span class="toolbar-date">{{ today }}</span>
    </mat-toolbar>

    <!-- Router outlet -->
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
